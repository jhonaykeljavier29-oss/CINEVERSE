<!-- HERO SECTION - CON EFECTOS PERO SIN SCROLL INDICATOR -->
<section class="hero">
  <!-- Fondo con efecto cinematográfico (MANTENER) -->
  <div class="hero__background">
    <div class="hero__gradient"></div>
    <div class="hero__scanlines"></div>
    <div class="hero__vignette"></div>
  </div>

  <!-- Partículas y efectos de luz (MANTENER) -->
  <div class="hero__lights">
    <div class="light light--1"></div>
    <div class="light light--2"></div>
    <div class="light light--3"></div>
  </div>

  <!-- Contenido principal -->
  <div class="hero__content">
    <!-- Marca/Logo -->
    <div class="hero__brand">
      <span class="brand-dot"></span>
      <span class="brand-text">CINEVERSE</span>
      <span class="brand-dot"></span>
    </div>

    <!-- Título principal con efecto de spotlight -->
    <h1 class="hero__title">
      <span class="title-line title-line--1">BIENVENIDO AL</span>
      <span class="title-line title-line--2">
        <span class="title-highlight">UNIVERSO</span>
      </span>
      <span class="title-line title-line--3">
        <span class="title-gradient">CINEMATOGRÁFICO</span>
      </span>
    </h1>

    <!-- Descripción -->
    <p class="hero__description">
      Explora, descubre y sumérgete en las historias<br class="desktop-break">
      <span class="description-highlight">que definen nuestra era.</span>
    </p>

    <!-- BOTONES MÁS GRANDES -->
    <div class="hero__actions">
      <a routerLink="/descubrir" class="btn btn--primary">
        <span class="btn-text">COMENZAR VIAJE</span>
      
       
      </a>
      
      <a routerLink="/descubrir" class="btn btn--secondary">
        <span class="btn-text">EXPLORAR</span>
      
      </a>
    </div>

    <!-- ESTADÍSTICAS (las dejamos, están chulas) -->
    <div class="hero__stats">
      <div class="stat-item">
        <span class="stat-number">10K+</span>
        <span class="stat-label">PELÍCULAS</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">500+</span>
        <span class="stat-label">GÉNEROS</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">1M+</span>
        <span class="stat-label">USUARIOS</span>
      </div>
    </div>
  </div>

  <!-- Elementos decorativos flotantes (MANTENER) -->
  <div class="hero__decor">
    <div class="decor-circle decor-circle--1"></div>
    <div class="decor-circle decor-circle--2"></div>
    <div class="decor-line decor-line--1"></div>
    <div class="decor-line decor-line--2"></div>
  </div>

  <!-- ELIMINADO: Sección "DESCUBRE MÁS" (hero__scroll) -->
</section>
