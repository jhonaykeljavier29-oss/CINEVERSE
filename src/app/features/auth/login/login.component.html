<div class="auth-container">
  <div class="auth-card">
    
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-text">CINEVERSE</span>
    </div>

    <h2 class="auth-title">
      {{ isRegister ? 'Crear Cuenta' : 'Bienvenido de nuevo' }}
    </h2>
    
    <!-- Tabs -->
    <div class="auth-tabs">
      <button 
        class="tab-btn" 
        [class.active]="!isRegister" 
        (click)="toggleMode()">
        Iniciar Sesión
      </button>
      <button 
        class="tab-btn" 
        [class.active]="isRegister" 
        (click)="toggleMode()">
        Registrarse
      </button>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" class="auth-form">
      
      <!-- Campo Nombre (solo registro) -->
      <div class="form-group" *ngIf="isRegister">
        <label for="name">Nombre completo</label>
        <input 
          type="text" 
          id="name"
          class="form-input"
          [(ngModel)]="name" 
          name="name"
          placeholder="Tu nombre"
          required>
      </div>

      <!-- Campo Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          class="form-input"
          [(ngModel)]="email" 
          name="email"
          placeholder="tu@email.com"
          required>
      </div>

      <!-- Campo Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password"
          class="form-input"
          [(ngModel)]="password" 
          name="password"
          placeholder="••••••••"
          required>
      </div>

      <!-- Campo Confirmar Contraseña (solo registro) -->
      <div class="form-group" *ngIf="isRegister">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          type="password" 
          id="confirmPassword"
          class="form-input"
          [(ngModel)]="confirmPassword" 
          name="confirmPassword"
          placeholder="••••••••"
          required>
      </div>

      <!-- Mensaje de error -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Botón de submit -->
      <button type="submit" class="auth-button">
        {{ isRegister ? 'Registrarse' : 'Iniciar Sesión' }}
      </button>

      <!-- Link para recuperar contraseña (solo login) -->
      <a *ngIf="!isRegister" href="#" class="forgot-link">
        ¿Olvidaste tu contraseña?
      </a>
    </form>

    <!-- Términos y condiciones (solo registro) -->
    <p class="terms-text" *ngIf="isRegister">
      Al registrarte, aceptas nuestros 
      <a href="#">Términos de uso</a> y 
      <a href="#">Política de privacidad</a>
    </p>
  </div>

  <!-- Fondo decorativo -->
  <div class="auth-backdrop"></div>
</div>
